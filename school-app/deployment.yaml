apiVersion: apps/v1
kind: Deployment
metadata:
  name: school-app-deployment
  namespace: scl-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: school-app
  template:
    metadata:
      labels:
        app: school-app
    spec:
      containers:
      - name: school-app-container
        image: rithika17/school-app:v1.0.0
        ports:
        - containerPort: 8080